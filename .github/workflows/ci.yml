name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version-file: .python-version
      - uses: astral-sh/setup-uv@d31148d669074a8d0a63714ba94f3201e7020bc3 # v8.3.0
        with:
          version: "0.11.18"
      - name: Create CI environment
        run: cp .env.example .env
      - name: Install dependencies
        run: uv sync --all-packages
      - name: Start PostgreSQL
        run: docker compose up -d --wait db mailcatcher
      - name: Migrate database
        working-directory: backend
        run: uv run bash scripts/prestart.sh
      - name: Test backend
        working-directory: backend
        run: uv run bash scripts/tests-start.sh "Coverage for ${{ github.sha }}"
      - name: Stop services
        if: always()
        run: docker compose down -v --remove-orphans

  frontend:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.12
      - run: bun ci
      - run: bun run --filter frontend build

  containers:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Build backend image
        run: docker build -f backend/Dockerfile -t full-stack-fastapi-backend:test .
      - name: Build frontend image
        run: >-
          docker build -f frontend/Dockerfile
          --build-arg VITE_API_URL=https://api-fast-fs.chenchangchao.com
          -t full-stack-fastapi-frontend:test .
