services:
  prestart:
    image: ${BACKEND_IMAGE:-ghcr.io/chenchangchao/full-stack-fastapi-backend}:${IMAGE_TAG:-latest}
    command: bash scripts/prestart.sh
    env_file:
      - ${RUNTIME_ENV_FILE:-production.env}
    restart: "no"

  backend:
    image: ${BACKEND_IMAGE:-ghcr.io/chenchangchao/full-stack-fastapi-backend}:${IMAGE_TAG:-latest}
    env_file:
      - ${RUNTIME_ENV_FILE:-production.env}
    restart: unless-stopped
    depends_on:
      prestart:
        condition: service_completed_successfully
    ports:
      - "127.0.0.1:8000:8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/utils/health-check/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    image: ${FRONTEND_IMAGE:-ghcr.io/chenchangchao/full-stack-fastapi-frontend}:${IMAGE_TAG:-latest}
    restart: unless-stopped
    ports:
      - "127.0.0.1:8080:80"
    depends_on:
      backend:
        condition: service_healthy
