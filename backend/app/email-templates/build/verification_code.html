<!doctype html>
<html lang="en">
  <body style="background:#f5f5f5;font-family:Arial,sans-serif;margin:0;padding:32px 16px">
    <div style="background:#fff;border-radius:8px;margin:0 auto;max-width:560px;padding:32px">
      <h2 style="margin-top:0">{{ project_name }}</h2>
      <p>Use the verification code below to {{ action }}:</p>
      <div style="font-size:32px;font-weight:700;letter-spacing:8px;margin:28px 0;text-align:center">{{ code }}</div>
      <p>This code expires in {{ valid_minutes }} minutes and can only be used once.</p>
      <p style="color:#666;font-size:13px">If you did not request this code, you can safely ignore this email.</p>
    </div>
  </body>
</html>
